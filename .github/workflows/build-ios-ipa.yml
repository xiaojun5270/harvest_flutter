name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-ios-ipa.yml"
      - "ios/**"
      - "lib/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"

permissions:
  contents: write

jobs:
  ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          xcodebuild -version

      - name: Build iOS without code signing
        id: build_ios
        shell: bash
        run: |
          set +e
          xcodebuild \
            -project ios/Runner.xcodeproj \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ios-native \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build-ios.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Package IPA
        id: package
        if: steps.build_ios.outputs.status == '0'
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          FILE_NAME="harvest_${VERSION}_arm64-ios.ipa"
          APP_PATH="build/ios-native/Build/Products/Release-iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Runner.app was not produced at $APP_PATH"
            exit 1
          fi

          rm -rf Payload "$FILE_NAME"
          mkdir Payload
          cp -R "$APP_PATH" Payload/Runner.app
          /usr/bin/zip -qry "$FILE_NAME" Payload

          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$FILE_NAME"

      - name: Upload IPA artifact
        if: steps.build_ios.outputs.status == '0'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.file_name }}
          path: ${{ steps.package.outputs.file_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish IPA to GitHub Releases
        if: steps.build_ios.outputs.status == '0' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.file_name }}

      - name: Upload iOS build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-log
          path: build-ios.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Report iOS build failure
        if: steps.build_ios.outputs.status != '0'
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### iOS build failed"
            echo
            echo '```text'
            tail -n 160 build-ios.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          grep -Ei \
            "error:|fatal error:|Could not build|Failed to build|Swift Compiler Error|No such module|The sandbox is not in sync|Provisioning profile|Code signing|Command PhaseScriptExecution failed" \
            build-ios.log | tail -n 25 | while IFS= read -r line; do
              echo "::error::$line"
            done

          exit "${{ steps.build_ios.outputs.status }}"
