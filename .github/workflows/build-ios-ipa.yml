name: Build iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/build-ios-ipa.yml"
      - "ios/**"
      - "lib/**"
      - "assets/**"
      - "pubspec.yaml"
      - "pubspec.lock"

permissions:
  contents: write

jobs:
  ipa:
    name: Build unsigned IPA
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.7"
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          xcodebuild -version

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without code signing
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        id: package
        shell: bash
        run: |
          set -euo pipefail

          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          FILE_NAME="harvest_${VERSION}_arm64-ios.ipa"
          APP_PATH="build/ios/iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::Runner.app was not produced at $APP_PATH"
            exit 1
          fi

          rm -rf Payload "$FILE_NAME"
          mkdir Payload
          cp -R "$APP_PATH" Payload/Runner.app
          /usr/bin/zip -qry "$FILE_NAME" Payload

          echo "file_name=$FILE_NAME" >> "$GITHUB_OUTPUT"
          ls -lh "$FILE_NAME"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.file_name }}
          path: ${{ steps.package.outputs.file_name }}
          if-no-files-found: error
          retention-days: 14

      - name: Publish IPA to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.file_name }}
