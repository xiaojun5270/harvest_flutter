<!DOCTYPE html>
<html>
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="$FLUTTER_BASE_HREF">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta content="Harvest Project App Client" name="description">

    <!-- iOS meta tags & icons -->
    <meta content="yes" name="mobile-web-app-capable">
    <meta content="black" name="mobile-web-app-status-bar-style">
    <meta content="harvest" name="mobile-web-app-title">
    <!--    <link href="icons/Icon-192.png" rel="touch-icon">-->

    <!-- Favicon -->
    <link href="favicon.ico" rel="icon">

    <title>harvest</title>
    <link href="manifest.json" rel="manifest">


    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

    <style id="splash-screen-style">
        html {
          height: 100%;
        }

        body {
          margin: 0;
          min-height: 100%;
          background-color: #ffffff;
        }

        #splash {
          position: fixed;
          inset: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          background-color: #ffffff;
          z-index: 9999;
        }

        #splash img {
          width: 160px;   /* 固定宽度，按需调整 */
          height: 160px;  /* 固定高度，按需调整 */
          object-fit: contain;
        }
    </style>
    <script id="splash-screen-script">
        function removeSplashFromWeb() {
          document.getElementById("splash")?.remove();
          document.getElementById("splash-branding")?.remove();
          document.body.style.background = "transparent";
        }
    </script>
</head>
<body>
<div id="splash">
    <img src="splash/img/light-background.png" alt="loading">
</div>

<script>
    {{flutter_js}}
    {{flutter_build_config}}

    _flutter.loader.load({
      serviceWorkerSettings: {
        serviceWorkerVersion: {{flutter_service_worker_version}},
      },
      config: {
        canvasKitBaseUrl: "canvaskit/",
      },
      onEntrypointLoaded: function(engineInitializer) {
        engineInitializer.initializeEngine().then(function(appRunner) {
          removeSplashFromWeb();
          appRunner.runApp();
        });
      },
    });
</script>


</body>
</html>
